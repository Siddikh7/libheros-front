<div class="auth-page">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Connexion</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" />
          <mat-error *ngIf="form.controls.email.hasError('required')">Email requis</mat-error>
          <mat-error *ngIf="form.controls.email.hasError('email')">Email invalide</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Mot de passe</mat-label>
          <input matInput type="password" formControlName="password" />
          <mat-error *ngIf="form.controls.password.hasError('required')">
            Mot de passe requis
          </mat-error>
          <mat-error *ngIf="form.controls.password.hasError('minlength')">
            Minimum 8 caractères
          </mat-error>
        </mat-form-field>

        <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

        <button mat-flat-button color="primary" type="submit" [disabled]="isSubmitting">
          Se connecter
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions>
      <a mat-button routerLink="/register">Créer un compte</a>
    </mat-card-actions>
  </mat-card>
</div>
