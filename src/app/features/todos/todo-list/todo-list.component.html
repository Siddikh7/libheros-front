<section class="todo-page">
	<mat-card class="todo-card">
		<mat-card-header>
			<mat-card-title>Mes tâches</mat-card-title>
			<mat-card-subtitle>Liste synchronisée depuis l'API NestJS</mat-card-subtitle>
		</mat-card-header>

		<mat-card-content>
			<div class="todo-table-wrap" *ngIf="todos$ | async as todos">
				<table mat-table [dataSource]="todos" class="todo-table">
					<ng-container matColumnDef="title">
						<th mat-header-cell *matHeaderCellDef>Tâche</th>
						<td mat-cell *matCellDef="let todo">{{ todo.title }}</td>
					</ng-container>

					<ng-container matColumnDef="completed">
						<th mat-header-cell *matHeaderCellDef>Statut</th>
						<td mat-cell *matCellDef="let todo">
							<mat-checkbox [checked]="todo.completed" disabled>
								{{ todo.completed ? 'Terminée' : 'À faire' }}
							</mat-checkbox>
						</td>
					</ng-container>

					<tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
					<tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
				</table>

				<p class="empty-state" *ngIf="todos.length === 0">
					Aucune tâche disponible pour le moment.
				</p>
			</div>
		</mat-card-content>
	</mat-card>
</section>
