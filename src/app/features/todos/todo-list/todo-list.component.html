<section class="todo-page">
	<mat-card class="todo-card">
		<mat-card-header>
			<mat-card-title>Mes tâches</mat-card-title>
			<mat-card-subtitle>Liste synchronisée depuis l'API NestJS</mat-card-subtitle>
			<button mat-button color="warn" type="button" class="logout-button" (click)="logout()">
				Déconnexion
			</button>
		</mat-card-header>

		<mat-card-content>
			<form [formGroup]="todoForm" (ngSubmit)="addTodo()" class="add-todo-form">
				<mat-form-field appearance="outline" class="full-width">
					<mat-label>Nouvelle tâche</mat-label>
					<input matInput placeholder="Ex: Déployer l'API sur le serveur" formControlName="title">
					<mat-error *ngIf="todoForm.controls.title.hasError('required')">
						Le titre de la tâche est requis.
					</mat-error>
					<mat-error *ngIf="todoForm.controls.title.hasError('minlength')">
						Le titre doit contenir au moins 3 caractères.
					</mat-error>
				</mat-form-field>

				<button mat-flat-button color="primary" type="submit" [disabled]="todoForm.invalid || isSubmitting">
					Ajouter
				</button>
			</form>

			<div class="todo-table-wrap">
				<table mat-table [dataSource]="todos" class="todo-table" [trackBy]="trackByTodoId">
					<ng-container matColumnDef="title">
						<th mat-header-cell *matHeaderCellDef>Tâche</th>
						<td mat-cell *matCellDef="let todo">{{ todo.title }}</td>
					</ng-container>

					<ng-container matColumnDef="completed">
						<th mat-header-cell *matHeaderCellDef>Statut</th>
						<td mat-cell *matCellDef="let todo">
							<mat-checkbox [checked]="todo.completed" (change)="toggleTodo(todo)">
								{{ todo.completed ? 'Terminé' : 'À faire' }}
							</mat-checkbox>
						</td>
					</ng-container>

					<ng-container matColumnDef="actions">
						<th mat-header-cell *matHeaderCellDef>Actions</th>
						<td mat-cell *matCellDef="let todo">
							<button mat-button color="warn" type="button" (click)="deleteTodo(todo.id)">
								Supprimer
							</button>
						</td>
					</ng-container>

					<tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
					<tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
				</table>

				<p class="empty-state" *ngIf="todos.length === 0">
					Aucune tâche disponible pour le moment.
				</p>
			</div>
		</mat-card-content>
	</mat-card>
</section>
