<h2 mat-dialog-title>Confirmer la suppression</h2>
<mat-dialog-content>
  <p>Cette action supprimera définitivement la tâche suivante :</p>
  <p><strong>{{ data.title }}</strong></p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancel()">Annuler</button>
  <button mat-flat-button color="warn" type="button" (click)="confirm()">Confirmer</button>
</mat-dialog-actions>
